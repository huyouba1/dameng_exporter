groups:
- name: DatabaseStatus_MonitoringAlarm
  rules:
  - alert: HostLostContact
    expr: up == 0
    for: 15s
    labels:
      severity: ERROR
    annotations:
      description: "主机：{{ $labels.instance }} 服务宕机"
      summary: "主机：{{ $labels.instance }}:服务器超过1m无法连接"
  - alert: DatabaseInstanceDown
    expr: dmdb_up == 0
    for: 15s
    labels:
      severity: ERROR
    annotations:
      description: "数据源：{{ $labels.datasource }} 数据库实例不可用"
      summary: "数据源：{{ $labels.datasource }}:dmdb_up=0，数据库实例宕机，请立即处理"

  - alert: NodeSwitchingOccurs
    expr: changes(dmdbms_mode_info[2m]) > 0
    for: 0s
    labels:
      severity: ERROR
    annotations:
      description: "数据源：{{ $labels.datasource }} 实例模式在最近 2 分钟内发生变化，请确认是否为主备切换或角色切换。"
      summary: "数据源：{{ $labels.datasource }} 检测到实例模式切换"

  - alert: DatabaseStateTransition
    expr: dmdbms_status_info != 1
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 数据库状态已脱离OPEN"
      summary: "数据源：{{ $labels.datasource }}:数据库状态不为OPEN，请立即核实"
  - alert: DatabaseConnectionsIsTooHigh
    expr: ((((sum by (datasource,env,region,cluster) (dmdbms_session_type_info)) * 100) / on(datasource,env,region,cluster) dmdbms_parameter_info{param_name="MAX_SESSIONS"}) > 80) and on(datasource,env,region,cluster) dmdbms_parameter_info{param_name="MAX_SESSIONS"} > 0
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 数据库连接数过高"
      summary: "数据源：{{ $labels.datasource }}:数据库的连接数超过80%，请确认是否正常"
  - alert: DatabaseLockWaitIncreased
    expr: increase(dmdbms_dead_lock_num_total[1m]) > 0
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 数据库死锁累计值出现新增"
      summary: "数据源：{{ $labels.datasource }}:近1分钟新增死锁事件，请确认是否存在锁等待"
  - alert: DatabaseTransactionBlocking
    expr: dmdbms_trx_num_info > 0
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 数据库存在事务阻塞，当前阻塞数：{{ printf \"%.0f\" $value }}"
      summary: "数据源：{{ $labels.datasource }}:存在事务阻塞等待，当前阻塞数{{ printf \"%.0f\" $value }}，请及时处理"
  - alert: DatabaseUserLocked
    expr: dmdbms_user_list_info == 1
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 用户：{{ $labels.username }} 账号已锁定"
      summary: "数据源：{{ $labels.datasource }}:用户{{ $labels.username }}账号被锁定，请核实"
  - alert: CpuUsageIsTooHigh
    expr: 100 * (1 - avg(irate(node_cpu_seconds_total{mode="idle"}[2m])) by(instance)) > 80
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "主机：{{ $labels.instance }} cpu使用率过高"
      summary: "主机：{{ $labels.instance }}:cpu使用率过高，超过80%"
  - alert: MemoryUsageIsTooHigh
    expr: (1 - (node_memory_MemAvailable_bytes / (node_memory_MemTotal_bytes)))* 100 > 80
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "主机：{{ $labels.instance }} 内存使用率过高"
      summary: "主机：{{ $labels.instance }}:内存使用率过高，超过80%"
  - alert: DatabaseMemoryPoolIsTooHigh
    expr: dmdbms_memory_curr_pool_info/dmdbms_memory_total_pool_info*100 > 80
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 内存池使用率过高，当前值：{{ printf \"%.2f\" $value }}%"
      summary: "数据源：{{ $labels.datasource }}:内存池使用率过高，当前值{{ printf \"%.2f\" $value }}%，超过80%"
  - alert: HighDiskPartitionUsage
    expr: (node_filesystem_size_bytes{fstype=~"ext.*|xfs|nfs",mountpoint !~".*(pod|docker).*"}-node_filesystem_free_bytes{fstype=~"ext.*|xfs|nfs",mountpoint !~".*(pod|docker).*"}) *100/(node_filesystem_avail_bytes {fstype=~"ext.*|xfs|nfs",mountpoint !~".*(pod|docker).*"}+(node_filesystem_size_bytes{fstype=~"ext.*|xfs|nfs",mountpoint !~".*(pod|docker).*"}-node_filesystem_free_bytes{fstype=~"ext.*|xfs|nfs",mountpoint !~".*(pod|docker).*"})) >90
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "主机：{{ $labels.instance }} 磁盘分区使用率超过90%"
      summary: "主机：{{ $labels.instance }}: 磁盘分区使用率超过90%，请核实"
  - alert: DmdbmsRedoLogAccumulationTooHigh
    expr: (((dmdbms_rapply_sys_task_mem_used * 100) / on(datasource,env,region,cluster) (dmdbms_parameter_info{param_name="REDOS_BUF_SIZE"} * 1024 * 1024)) > 95) and on(datasource,env,region,cluster) dmdbms_parameter_info{param_name="REDOS_BUF_SIZE"} > 0
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 备库重做日志内存堆积使用率过高，当前值：{{ printf \"%.2f\" $value }}%"
      summary: "数据源：{{ $labels.datasource }}:备库重做日志内存堆积使用率{{ printf \"%.2f\" $value }}%，超过95%，请确认是否正常"
  - alert: DmdbmsRedoLogThreadsIsTooHigh
    expr: (((dmdbms_rapply_sys_task_num * 100) / on(datasource,env,region,cluster) dmdbms_parameter_info{param_name="REDOS_BUF_NUM"}) > 95) and on(datasource,env,region,cluster) dmdbms_parameter_info{param_name="REDOS_BUF_NUM"} > 0
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 备库重做日志线程数使用率过高，当前值：{{ printf \"%.2f\" $value }}%"
      summary: "数据源：{{ $labels.datasource }}:备库重做日志线程数使用率{{ printf \"%.2f\" $value }}%，超过95%，请确认是否正常"
  - alert: TableSpaceUtilizationIsTooHigh
    expr: dmdbms_tablespace_size_act_used_rt_info{tablespace_name!~"SYSTEM|TEMP|ROLL"} > 95
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} 存在表空间使用率过高，当前值：{{ printf \"%.2f\" $value }}%"
      summary: "数据源：{{ $labels.datasource }}:存在表空间使用率{{ printf \"%.2f\" $value }}%，超过95%，请核实"
  - alert: AsmGroupUtilizationOver80
    expr: dmdbms_asmgroup_size_used_pct_info > 80 and dmdbms_asmgroup_size_used_pct_info <= 90
    for: 15s
    labels:
      severity: WARNING
    annotations:
      description: "数据源：{{ $labels.datasource }} ASM group: {{ $labels.group_name }} utilization is too high, current value: {{ printf \"%.2f\" $value }}%"
      summary: "数据源：{{ $labels.datasource }}:ASM group {{ $labels.group_name }} utilization {{ printf \"%.2f\" $value }}%, over 80%"
  - alert: AsmGroupUtilizationOver90
    expr: dmdbms_asmgroup_size_used_pct_info > 90
    for: 15s
    labels:
      severity: ERROR
    annotations:
      description: "数据源：{{ $labels.datasource }} ASM group: {{ $labels.group_name }} utilization is too high, current value: {{ printf \"%.2f\" $value }}%"
      summary: "数据源：{{ $labels.datasource }}:ASM group {{ $labels.group_name }} utilization {{ printf \"%.2f\" $value }}%, over 90%"
